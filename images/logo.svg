<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <!-- Bridge cables -->
  <path d="M30 70 Q70 30 100 55 Q130 30 170 70" stroke="#7B6FA6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Bridge deck -->
  <line x1="25" y1="70" x2="175" y2="70" stroke="#7B6FA6" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bridge towers -->
  <line x1="70" y1="42" x2="70" y2="70" stroke="#7B6FA6" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="42" x2="130" y2="70" stroke="#7B6FA6" stroke-width="3" stroke-linecap="round"/>
  <!-- Graduation cap -->
  <polygon points="100,15 75,30 100,45 125,30" fill="#7B6FA6"/>
  <line x1="100" y1="30" x2="100" y2="50" stroke="#7B6FA6" stroke-width="2"/>
  <line x1="125" y1="30" x2="125" y2="38" stroke="#7B6FA6" stroke-width="2"/>
  <circle cx="125" cy="39.5" r="1.5" fill="#7B6FA6"/>
  <!-- Bridgeway text -->
  <text x="100" y="100" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="28" fill="#9B8EC4" letter-spacing="-0.5">Bridgeway</text>
</svg>
